{% extends "base.html" %}

{% block content %}

<div class="page-login">
  <div class="login-box">
    <!-- App title -->
    <h2 class="text-center fw-bold mb-1" style="color: var(--saffron); font-size: 28px;">
      🇮🇳 GroceryStore
    </h2>

    <p class="text-center text-muted mb-4 fw-semibold">
      Modern Indian Grocery Billing System
    </p>

    {% if error %}
      <div class="alert alert-danger text-center fw-semibold">
        🚫 {{ error }}
      </div>
    {% endif %}

    <form method="post">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input name="username" type="text" class="form-control" placeholder="Enter your username" required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Enter your password" required>
      </div>

      <!-- Button -->
      <button type="submit" class="btn btn-primary w-100 fw-semibold mb-3">
        🔐 Login to Dashboard
      </button>

      <p class="mt-3 text-center">
        New owner? <a href="/register" class="text-decoration-none fw-semibold" style="color: var(--saffron);">Register here</a>
      </p>

    </form>

  </div>
</div>

{% endblock %}
