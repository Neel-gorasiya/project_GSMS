{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Billing</h2>
  <div class="fs-4 fw-semibold text-success">
    Total: ₹ <span id="grand-total">0.00</span>
  </div>
</div>

{% if error %}
<div class="alert alert-danger">
  {{ error }}
</div>
{% endif %}

<form method="post">

  <!-- Customer & Payment -->
  <div class="card mb-3">
    <div class="card-body">

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Customer</label>
          <select name="customer_id" class="form-select">
            <option value="cash">Walk-in / Cash Customer</option>
            {% for c in customers %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Payment Type</label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="payment_type" value="cash" checked>
              <label class="form-check-label">Cash</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="payment_type" value="online">
              <label class="form-check-label">Online</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="payment_type" value="credit" id="credit-radio">
              <label class="form-check-label">Pay Later</label>
            </div>
          </div>
          <div id="due-date-container" class="mt-2" style="display: none;">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-control">
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Add Item -->
  <div class="card mb-3">
    <div class="card-body">

      <h5 class="mb-3">Add Item</h5>

      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Product</label>
          <select id="item-product" class="form-select">
            <option value="">Select product</option>
            {% for p in products %}
              <option value="{{ p.id }}" data-unit="{{ p.unit }}" data-price="{{ p.sell_price }}">
                {{ p.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-2">
          <label class="form-label">Qty</label>
          <input type="number" id="item-qty" class="form-control" min="1">
        </div>

        <div class="col-md-2">
          <label class="form-label">Unit</label>
          <input type="text" id="item-unit" class="form-control" readonly>
        </div>

        <div class="col-md-2">
          <label class="form-label">Price</label>
          <input type="number" id="item-price" class="form-control" step="0.01">
        </div>

        <div class="col-md-2">
          <button type="button" id="add-item-btn" class="btn btn-secondary w-100">
            Add
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Items Table -->
  <div class="card mb-3">
    <div class="card-body">
      <table class="table table-sm table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>Product</th>
            <th class="text-end">Qty</th>
            <th>Unit</th>
            <th class="text-end">Price</th>
            <th class="text-end">Total</th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
    </div>
  </div>

  <div id="hidden-items"></div>

  <button type="submit" class="btn btn-primary">
    Create Bill
  </button>

</form>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const product = document.getElementById("item-product");
  const qty = document.getElementById("item-qty");
  const unit = document.getElementById("item-unit");
  const price = document.getElementById("item-price");
  const addBtn = document.getElementById("add-item-btn");
  const body = document.getElementById("items-body");
  const hidden = document.getElementById("hidden-items");
  const totalSpan = document.getElementById("grand-total");
  const creditRadio = document.getElementById("credit-radio");
  const dueDateContainer = document.getElementById("due-date-container");

  let total = 0;

  // Handle payment type change
  document.querySelectorAll('input[name="payment_type"]').forEach(radio => {
    radio.addEventListener("change", () => {
      if (creditRadio.checked) {
        dueDateContainer.style.display = "block";
      } else {
        dueDateContainer.style.display = "none";
      }
    });
  });

  product.focus();

  product.addEventListener("change", () => {
    const opt = product.options[product.selectedIndex];
    unit.value = opt.dataset.unit || "";
    price.value = opt.dataset.price || "";
    qty.focus();
  });

  function addItem() {
    if (!product.value || !qty.value || !price.value) return;

    const name = product.options[product.selectedIndex].text;
    const q = parseFloat(qty.value);
    const p = parseFloat(price.value);
    const lt = q * p;

    body.insertAdjacentHTML("beforeend", `
      <tr>
        <td>${name}</td>
        <td class="text-end">${q}</td>
        <td>${unit.value}</td>
        <td class="text-end">${p.toFixed(2)}</td>
        <td class="text-end">${lt.toFixed(2)}</td>
      </tr>
    `);

    hidden.insertAdjacentHTML("beforeend", `
      <input type="hidden" name="product_id[]" value="${product.value}">
      <input type="hidden" name="quantity[]" value="${q}">
      <input type="hidden" name="price[]" value="${p}">
    `);

    total += lt;
    totalSpan.textContent = total.toFixed(2);

    product.value = "";
    qty.value = "";
    price.value = "";
    unit.value = "";
    product.focus();
  }

  addBtn.addEventListener("click", addItem);

  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && document.activeElement !== document.querySelector("button[type=submit]")) {
      e.preventDefault();
      addItem();
    }
    if (e.ctrlKey && e.key === "Enter") {
      document.querySelector("form").submit();
    }
  });
});
</script>

{% endblock %}
