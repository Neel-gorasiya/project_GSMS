<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add New Owner</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">

     <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <body>
    {# Show navbar ONLY when show_nav is true #}
    {% if show_nav %}
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="/">Admin Panel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/admin">Users</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/add_owner">Add Owner</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/logout">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    {% endif %}

    <!-- Page content -->
    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">Add New Owner</h5>
            </div>
            <div class="card-body">
              {% if error %}
              <div class="alert alert-danger">
                {{ error }}
              </div>
              {% endif %}

              {% if success %}
              <div class="alert alert-success">
                {{ success }}
              </div>
              {% endif %}

              <form method="post">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Shop Name</label>
                  <input type="text" name="shop_name" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">GST Number (optional)</label>
                  <input type="text" name="gst_number" class="form-control">
                </div>

                <div class="mb-3">
                  <label class="form-label">Username</label>
                  <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" name="confirm_password" class="form-control" required>
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary">Create Owner Account</button>
                  <a href="/admin" class="btn btn-secondary">Back to Admin Panel</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap 5 JS + Popper (needed for navbar toggle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-..."
            crossorigin="anonymous"></script>
  </body>
</html>
